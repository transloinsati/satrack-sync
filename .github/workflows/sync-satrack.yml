name: Sync Satrack

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      only_ticket_id:
        description: "Id Ticket para acotar la corrida a uno solo (opcional)"
        required: false

concurrency:
  group: sync-satrack
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - run: npm install

      - run: npm run sync
        env:
          SATRACK_CLIENT_ID: ${{ secrets.SATRACK_CLIENT_ID }}
          SATRACK_CLIENT_SECRET: ${{ secrets.SATRACK_CLIENT_SECRET }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNC_ONLY_TICKET_ID: ${{ github.event.inputs.only_ticket_id }}
